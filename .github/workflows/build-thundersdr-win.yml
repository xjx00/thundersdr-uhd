name: Build UHD Windows

on:
  workflow_dispatch:

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build UHD for Windows
    runs-on: windows-2022

    env:
      BUILD_TYPE: Release
      INSTALL_DIR: ${{ github.workspace }}\uhd-install
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python build tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install mako requests numpy

      - name: Setup MSVC developer shell
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}\vcpkg_installed
            C:\vcpkg\archives
          key: vcpkg-uhd-windows-${{ runner.os }}-${{ hashFiles('.github/workflows/build-uhd-windows.yml') }}
          restore-keys: |
            vcpkg-uhd-windows-${{ runner.os }}-

      - name: Install UHD dependencies with vcpkg
        shell: pwsh
        run: |
          vcpkg install `
            boost-filesystem:x64-windows `
            boost-program-options:x64-windows `
            boost-system:x64-windows `
            boost-thread:x64-windows `
            boost-serialization:x64-windows `
            boost-regex:x64-windows `
            boost-date-time:x64-windows `
            libusb:x64-windows `
            libusb-win32:x64-windows `
            spdlog:x64-windows `
            fmt:x64-windows

      - name: Configure UHD
        shell: pwsh
        run: |
          cmake -S host -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL_DIR }}" `
            -DENABLE_TESTS=OFF `
            -DENABLE_EXAMPLES=OFF `
            -DENABLE_UTILS=ON `
            -DENABLE_USB=ON `
            -DENABLE_PYTHON_API=OFF `
            -DENABLE_C_API=ON

      - name: Build UHD
        shell: pwsh
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Install UHD
        shell: pwsh
        run: |
          cmake --install build --config ${{ env.BUILD_TYPE }}

      - name: Copy vcpkg runtime DLLs
        shell: pwsh
        run: |
          $bin = "${{ env.INSTALL_DIR }}\bin"
          New-Item -ItemType Directory -Force -Path $bin | Out-Null

          $vcpkgBin = "C:\vcpkg\installed\x64-windows\bin"
          if (Test-Path $vcpkgBin) {
            Copy-Item "$vcpkgBin\*.dll" $bin -Force -ErrorAction SilentlyContinue
          }

      - name: Package UHD as zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"

          if ("${{ github.ref_type }}" -ne "tag") {
            $tag = "${{ github.sha }}"
          }

          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $safeTag = $tag -replace '[^a-zA-Z0-9._-]', '-'
          $zipName = "uhd-windows-x64-$safeTag-$shortSha.zip"

          Compress-Archive `
            -Path "${{ env.INSTALL_DIR }}\*" `
            -DestinationPath "$zipName" `
            -Force

          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Upload zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true