name: Build UHD Windows Docker

on:
  workflow_dispatch:

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-docker:
    name: Build UHD Windows in Docker
    runs-on: windows-2025
    timeout-minutes: 360

    env:
      BUILD_TYPE: Release
      DOCKER_IMAGE: uhd-builder-vs2022-v143-x64-py312-local
      DOCKERFILE: .ci/docker/uhd-builder-vs2022-v143-x64-py312.Dockerfile
      INSTALL_DIR_IN_CONTAINER: C:\out\uhd-install
      BUILD_DIR_IN_CONTAINER: C:\uhd-build

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Check Docker
        shell: pwsh
        run: |
          docker version
          docker info

      - name: Build UHD Windows builder Docker image
        shell: pwsh
        run: |
          if (!(Test-Path "${{ env.DOCKERFILE }}")) {
            throw "Dockerfile not found: ${{ env.DOCKERFILE }}"
          }

          docker build `
            --isolation=process `
            -t ${{ env.DOCKER_IMAGE }} `
            -f ${{ env.DOCKERFILE }} `
            .

      - name: Build UHD inside Docker container
        shell: pwsh
        run: |
          $workspace = "${{ github.workspace }}"
          $dist = Join-Path $workspace "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $buildCmd = @'
          call "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64 && ^
          git config --global --add safe.directory C:/src && ^
          if exist C:\uhd-build rmdir /S /Q C:\uhd-build && ^
          if exist C:\out\uhd-install rmdir /S /Q C:\out\uhd-install && ^
          mkdir C:\uhd-build && ^
          cmake -S C:\src\host -B C:\uhd-build ^
            -G "Visual Studio 17 2022" ^
            -A x64 ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_INSTALL_PREFIX=C:\out\uhd-install ^
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=uhd-x64-windows-static-md ^
            -DVCPKG_INSTALLED_DIR=C:\uhd-vcpkg\vcpkg_installed ^
            -DVCPKG_MANIFEST_DIR=C:\uhd-vcpkg ^
            -DENABLE_TESTS=OFF ^
            -DENABLE_EXAMPLES=OFF ^
            -DENABLE_UTILS=ON ^
            -DENABLE_USB=ON ^
            -DENABLE_PYTHON_API=OFF ^
            -DENABLE_C_API=ON ^
            -DCMAKE_C_FLAGS="/MP" ^
            -DCMAKE_CXX_FLAGS="/MP /D_SILENCE_NONFLOATING_COMPLEX_DEPRECATION_WARNING" && ^
          cmake --build C:\uhd-build --config Release --parallel %NUMBER_OF_PROCESSORS% -- /m:%NUMBER_OF_PROCESSORS% && ^
          cmake --install C:\uhd-build --config Release
          '@

          docker run `
            --rm `
            --isolation=process `
            --cpu-count 6 `
            --memory 12G `
            -v "${workspace}:C:\src" `
            -v "${dist}:C:\out" `
            ${{ env.DOCKER_IMAGE }} `
            cmd /S /C $buildCmd

      - name: Verify install output
        shell: pwsh
        run: |
          $install = "${{ github.workspace }}\dist\uhd-install"

          if (!(Test-Path $install)) {
            throw "Install directory not found: $install"
          }

          Get-ChildItem -Recurse $install | Select-Object FullName

          if (!(Test-Path "$install\bin")) {
            throw "UHD install bin directory not found"
          }

      - name: Package UHD as zip
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          $shortSha = "${{ github.sha }}".Substring(0, 7)

          if ("${{ github.ref_type }}" -eq "tag") {
            $name = $refName
          } else {
            $name = $shortSha
          }

          $safeName = $name -replace '[^a-zA-Z0-9._-]', '-'
          $zipName = "uhd-windows-x64-docker-$safeName.zip"

          Compress-Archive `
            -Path "${{ github.workspace }}\dist\uhd-install\*" `
            -DestinationPath "${{ github.workspace }}\$zipName" `
            -Force

          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Upload zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true