name: Build Minimal UHD Windows

on:
  workflow_dispatch:

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-minimal:
    name: Build minimal UHD for Windows
    runs-on: windows-2022
    timeout-minutes: 360

    env:
      BUILD_TYPE: Release

      VCPKG_ROOT: C:\vcpkg
      VCPKG_TRIPLET: uhd-x64-windows-static-md
      VCPKG_MANIFEST_DIR: ${{ github.workspace }}\uhd-vcpkg
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}\vcpkg_installed
      VCPKG_BINARY_CACHE: ${{ github.workspace }}\vcpkg-binary-cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}\vcpkg-binary-cache,readwrite

      BUILD_DIR: ${{ github.workspace }}\build
      INSTALL_DIR: ${{ github.workspace }}\uhd-install

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Python
        uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.12"

      - name: Install Python build modules
        shell: pwsh
        run: |
          python --version
          python -m pip install --upgrade pip
          python -m pip install mako requests numpy ruamel.yaml setuptools jsonschema
          python -c "import mako, requests, numpy, ruamel.yaml, setuptools, jsonschema; print('Python modules OK')"

      - name: Setup MSVC developer shell
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Prepare vcpkg manifest and UHD triplet
        shell: pwsh
        run: |
          if (!(Test-Path "${{ env.VCPKG_ROOT }}\vcpkg.exe")) {
            throw "vcpkg.exe not found at ${{ env.VCPKG_ROOT }}\vcpkg.exe"
          }

          if (!(Test-Path "host\cmake\vcpkg")) {
            throw "UHD custom vcpkg triplet directory not found: host\cmake\vcpkg"
          }

          Copy-Item "host\cmake\vcpkg\*" "${{ env.VCPKG_ROOT }}\triplets\" -Force

          New-Item -ItemType Directory -Force -Path "${{ env.VCPKG_MANIFEST_DIR }}" | Out-Null
          New-Item -ItemType Directory -Force -Path "${{ env.VCPKG_INSTALLED_DIR }}" | Out-Null
          New-Item -ItemType Directory -Force -Path "${{ env.VCPKG_BINARY_CACHE }}" | Out-Null

          @'
          {
            "dependencies": [
              "boost-asio",
              "boost-assign",
              "boost-atomic",
              "boost-circular-buffer",
              "boost-date-time",
              "boost-dll",
              "boost-exception",
              "boost-filesystem",
              "boost-format",
              "boost-graph",
              "boost-lockfree",
              "boost-math",
              "boost-program-options",
              "boost-regex",
              "boost-serialization",
              "boost-stacktrace",
              "boost-system",
              "boost-thread",
              "boost-timer",
              "boost-units",
              "pkgconf"
            ],
            "builtin-baseline": "f176b58f35a75f9f8f54099cd9df97d2e2793a2e"
          }
          '@ | Set-Content -Encoding UTF8 "${{ env.VCPKG_MANIFEST_DIR }}\vcpkg.json"

          Write-Host "VCPKG_ROOT=${{ env.VCPKG_ROOT }}"
          Write-Host "VCPKG_TRIPLET=${{ env.VCPKG_TRIPLET }}"
          Write-Host "VCPKG_MANIFEST_DIR=${{ env.VCPKG_MANIFEST_DIR }}"
          Write-Host "VCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }}"
          Write-Host "VCPKG_BINARY_CACHE=${{ env.VCPKG_BINARY_CACHE }}"

      - name: Restore vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_INSTALLED_DIR }}
          key: vcpkg-installed-${{ runner.os }}-${{ env.VCPKG_TRIPLET }}-${{ hashFiles('host/cmake/vcpkg/**') }}-minimal-x300-v2
          restore-keys: |
            vcpkg-installed-${{ runner.os }}-${{ env.VCPKG_TRIPLET }}-

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_BINARY_CACHE }}
          key: vcpkg-binary-${{ runner.os }}-${{ env.VCPKG_TRIPLET }}-${{ hashFiles('host/cmake/vcpkg/**') }}-minimal-x300-v2
          restore-keys: |
            vcpkg-binary-${{ runner.os }}-${{ env.VCPKG_TRIPLET }}-

      - name: Install UHD dependencies with vcpkg manifest
        shell: pwsh
        run: |
          & "${{ env.VCPKG_ROOT }}\vcpkg.exe" version

          & "${{ env.VCPKG_ROOT }}\vcpkg.exe" install `
            --triplet "${{ env.VCPKG_TRIPLET }}" `
            --x-manifest-root="${{ env.VCPKG_MANIFEST_DIR }}" `
            --x-install-root="${{ env.VCPKG_INSTALLED_DIR }}" `
            --clean-after-build

      - name: Check required dependency headers
        shell: pwsh
        run: |
          $include = "${{ env.VCPKG_INSTALLED_DIR }}\${{ env.VCPKG_TRIPLET }}\include"

          $headers = @(
            "boost\asio.hpp",
            "boost\format.hpp",
            "boost\math\special_functions\round.hpp",
            "boost\graph\adjacency_list.hpp",
            "boost\program_options.hpp",
            "boost\filesystem.hpp"
          )

          foreach ($header in $headers) {
            $path = Join-Path $include $header
            if (!(Test-Path $path)) {
              throw "Missing dependency header: $path"
            }
            Write-Host "Found: $path"
          }

      - name: Configure minimal UHD
        shell: pwsh
        run: |
          if (Test-Path "${{ env.BUILD_DIR }}") {
            Remove-Item "${{ env.BUILD_DIR }}" -Recurse -Force
          }

          if (Test-Path "${{ env.INSTALL_DIR }}") {
            Remove-Item "${{ env.INSTALL_DIR }}" -Recurse -Force
          }

          cmake -S host -B "${{ env.BUILD_DIR }}" `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL_DIR }}" `
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="${{ env.VCPKG_TRIPLET }}" `
            -DVCPKG_INSTALLED_DIR="${{ env.VCPKG_INSTALLED_DIR }}" `
            -DVCPKG_MANIFEST_DIR="${{ env.VCPKG_MANIFEST_DIR }}" `
            -DCMAKE_PREFIX_PATH="${{ env.VCPKG_INSTALLED_DIR }}\${{ env.VCPKG_TRIPLET }}" `
            -DPYTHON_EXECUTABLE="${{ steps.setup-python.outputs.python-path }}" `
            -DRUNTIME_PYTHON_EXECUTABLE="${{ steps.setup-python.outputs.python-path }}" `
            -DCMAKE_C_FLAGS="/MP" `
            -DCMAKE_CXX_FLAGS="/EHsc /MP /D_SILENCE_NONFLOATING_COMPLEX_DEPRECATION_WARNING" `
            -DENABLE_TESTS=OFF `
            -DENABLE_EXAMPLES=OFF `
            -DENABLE_UTILS=ON `
            -DENABLE_PYTHON_API=OFF `
            -DENABLE_C_API=ON `
            -DENABLE_STATIC_LIBS=OFF `
            -DENABLE_USB=OFF `
            -DENABLE_NIRIO=OFF `
            -DENABLE_NIUSRP=OFF `
            -DENABLE_B100=OFF `
            -DENABLE_B200=OFF `
            -DENABLE_USRP1=OFF `
            -DENABLE_USRP2=OFF `
            -DENABLE_X300=ON `
            -DENABLE_MPMD=OFF `
            -DENABLE_SIM=OFF `
            -DENABLE_N300=OFF `
            -DENABLE_N320=OFF `
            -DENABLE_E300=OFF `
            -DENABLE_E320=OFF `
            -DENABLE_X400=OFF `
            -DENABLE_OCTOCLOCK=OFF `
            -DUHD_LOG_MIN_LEVEL=debug `
            -DUHD_LOG_CONSOLE_LEVEL=debug `
            -DUHD_LOG_FILE_LEVEL=debug `
            -DENABLE_DPDK=OFF

      - name: Print UHD component summary
        shell: pwsh
        run: |
          $cache = "${{ env.BUILD_DIR }}\CMakeCache.txt"

          if (!(Test-Path $cache)) {
            throw "CMakeCache.txt not found"
          }

          Select-String -Path $cache -Pattern "ENABLE_" | ForEach-Object {
            Write-Host $_.Line
          }

      - name: Build UHD with MSBuild parallelism
        shell: pwsh
        run: |
          $cpu = [Environment]::ProcessorCount
          Write-Host "CPU count: $cpu"

          cmake --build "${{ env.BUILD_DIR }}" `
            --config ${{ env.BUILD_TYPE }} `
            --parallel $cpu `
            -- `
            /m:$cpu `
            /p:CL_MPCount=$cpu

      - name: Install UHD
        shell: pwsh
        run: |
          cmake --install "${{ env.BUILD_DIR }}" --config ${{ env.BUILD_TYPE }}

      - name: Verify install output
        shell: pwsh
        run: |
          if (!(Test-Path "${{ env.INSTALL_DIR }}")) {
            throw "Install directory not found: ${{ env.INSTALL_DIR }}"
          }

          Get-ChildItem -Recurse "${{ env.INSTALL_DIR }}" | Select-Object FullName

          if (!(Test-Path "${{ env.INSTALL_DIR }}\bin")) {
            throw "UHD install bin directory not found"
          }

      - name: Package UHD as zip
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          $shortSha = "${{ github.sha }}".Substring(0, 7)

          if ("${{ github.ref_type }}" -eq "tag") {
            $name = $refName
          } else {
            $name = $shortSha
          }

          $safeName = $name -replace '[^a-zA-Z0-9._-]', '-'
          $zipName = "uhd-windows-x64-minimal-$safeName.zip"

          Compress-Archive `
            -Path "${{ env.INSTALL_DIR }}\*" `
            -DestinationPath "${{ github.workspace }}\$zipName" `
            -Force

          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
